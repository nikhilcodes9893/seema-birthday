```html
<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Mom</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
}

h1{
margin-top:70px;
font-size:60px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px yellow;}
}

h2{
font-size:35px;
}

#cake{
font-size:150px;
cursor:pointer;
margin-top:40px;
transition:transform 0.3s;
}

#cake:hover{
transform:scale(1.1);
}

.message{
font-size:24px;
width:60%;
margin:auto;
margin-top:20px;
}

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh); opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

.firework{
position:absolute;
width:8px;
height:8px;
background:yellow;
border-radius:50%;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(20); opacity:0;}
}

#gift{
font-size:70px;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Happy Birthday Mom 🎉</h1>

<h2>Dear Seema ❤️</h2>

<div id="cake">🎂</div>

<div id="gift">🎁</div>

<p class="message" id="msg">
Click the cake to blow the candles and celebrate!
</p>

<script>

const cake=document.getElementById("cake");
const gift=document.getElementById("gift");
const msg=document.getElementById("msg");

cake.onclick=function(){

cake.innerHTML="🍰";

msg.innerHTML="Happy Birthday Mom ❤️ Thank you for everything you do for me.";

for(let i=0;i<40;i++){
createHeart();
}

for(let i=0;i<30;i++){
createFirework();
}

};

gift.onclick=function(){

alert("Surprise! 🎂 Love you Mom ❤️");

};

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

function createFirework(){

let fire=document.createElement("div");
fire.className="firework";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*60+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1200);

}

setInterval(createHeart,1000);

</script>

</body>
</html>
